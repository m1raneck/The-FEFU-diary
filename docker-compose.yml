services:
  # База данных
  postgres:
    image: postgres:15
    container_name: university
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: university_db
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: always

  # Аутентификация
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth_subsystem
    ports:
      - "8000:8000"
    env_file:
      - ./services/auth-service/.env.example
    depends_on:
      - postgres

  # Посещаемость
  attendance-service:
    build:
      context: ./services/attendance-service
      dockerfile: Dockerfile
    container_name: attendance_subsystem
    ports:
      - "8001:8000"
    env_file:
      - ./services/attendance-service/.env.example
    depends_on:
      - postgres

  # Оценочки
  grades-service:
    build:
      context: ./services/grades-service
      dockerfile: Dockerfile
    container_name: grades_subsystem
    ports:
      - "8002:8000"
    env_file:
      - ./services/grades-service/.env.example
    depends_on:
      - postgres

  # Расписание
  schedule-service:
    build:
      context: ./services/schedule-service
      dockerfile: Dockerfile
    container_name: schedule_subsystem
    ports:
      - "8003:8000"
    env_file:
      - ./services/schedule-service/.env.example
    depends_on:
      - postgres