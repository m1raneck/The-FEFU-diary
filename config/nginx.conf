events {}

http {
    server {
        listen 80;

        location /api/auth/ {
            proxy_pass http://auth-service:8000/;
            proxy_set_header Host $host;
        }

        location /api/schedule/ {
            proxy_pass http://schedule-service:8000/;
            proxy_set_header Host $host;
        }

        # остальные сервисы по аналогии, наверное
    }
}
